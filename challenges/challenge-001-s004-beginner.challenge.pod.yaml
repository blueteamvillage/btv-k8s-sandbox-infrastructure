# Converged Frontier — shared namespace for all challenge-001 scenario pods.
#
# Bundled so `kubectl apply -f <this file>` is self-contained: kubectl creates
# the Namespace before the Pod. Applying several scenario files is safe — the
# Namespace is identical in each and `kubectl apply` is idempotent.
# blueteamvillage.org/disable-quotas lifts the sandbox's default 5-pod
# ResourceQuota so multiple scenario pods can coexist in this namespace.
apiVersion: v1
kind: Namespace
metadata:
  name: converged-frontier
  labels:
    blueteamvillage.org/disable-quotas: "true"
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
---
# Converged Frontier — s04 beginner CHALLENGE (The Exposed Controller)
#
# Contestant-facing evidence pod. Inspect the artifacts:
#   kubectl -n converged-frontier exec -it challenge-001-s004-beginner -- sh
#   #  then: ls /challenge/ ; cat /challenge/README.md ; ls -R /challenge/evidence/
#
# Published package: ghcr.io/blueteamvillage/challenge-001-s004-beginner:latest
# For local dc34 testing, build/build.sh tags the same ref so IfNotPresent uses it.
# Inert, restricted-PSS compliant (no PolicyException needed).
apiVersion: v1
kind: Pod
metadata:
  name: challenge-001-s004-beginner
  namespace: converged-frontier
  labels:
    app: converged-frontier
    scenario: s04
    track: beginner
    kind: challenge
spec:
  restartPolicy: Never
  automountServiceAccountToken: false
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: challenge
      image: ghcr.io/blueteamvillage/challenge-001-s004-beginner:latest
      # IfNotPresent uses the image built into the dc34 node by build/build.sh.
      imagePullPolicy: IfNotPresent
      env:
        - name: SCENARIO_TITLE
          value: "The Exposed Controller"
        - name: SCENARIO_TRACK
          value: beginner
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      resources:
        requests:
          cpu: 50m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi

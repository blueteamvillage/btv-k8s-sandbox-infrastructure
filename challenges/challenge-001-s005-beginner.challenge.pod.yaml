# Converged Frontier — shared namespace for all challenge-001 scenario pods.
#
# Bundled so `kubectl apply -f <this file>` is self-contained: kubectl creates
# the Namespace before the Pod. Applying several scenario files is safe — the
# Namespace is identical in each and `kubectl apply` is idempotent.
# blueteamvillage.org/disable-quotas lifts the sandbox's default 5-pod
# ResourceQuota so multiple scenario pods can coexist in this namespace.
apiVersion: v1
kind: Namespace
metadata:
  name: converged-frontier
  labels:
    blueteamvillage.org/disable-quotas: "true"
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
---
# Converged Frontier — s05 beginner CHALLENGE (The Frosted Loop)
#
# Contestant-facing evidence pod. Inspect the artifacts:
#   kubectl --context dc34 -n converged-frontier exec -it challenge-001-s005-beginner -- sh
#   #  then: ls /challenge/ ; cat /challenge/README.md ; ls -R /challenge/evidence/
#
# Published package: ghcr.io/blueteamvillage/challenge-001-s005-beginner:latest
# The package is PRIVATE until the CTF opens — see README "Pulling challenge
# images" for how to authenticate and preload it into the dc34 node.
# Inert, restricted-PSS compliant (no PolicyException needed).
apiVersion: v1
kind: Pod
metadata:
  name: challenge-001-s005-beginner
  namespace: converged-frontier
  labels:
    app: converged-frontier
    scenario: s05
    track: beginner
    kind: challenge
spec:
  restartPolicy: Never
  automountServiceAccountToken: false
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: challenge
      image: ghcr.io/blueteamvillage/challenge-001-s005-beginner:latest
      # IfNotPresent prefers an image already loaded into the dc34 node;
      # otherwise the kubelet pulls from GHCR (needs the package to be accessible).
      imagePullPolicy: IfNotPresent
      env:
        - name: SCENARIO_TITLE
          value: "The Frosted Loop"
        - name: SCENARIO_TRACK
          value: beginner
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      resources:
        requests:
          cpu: 50m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi

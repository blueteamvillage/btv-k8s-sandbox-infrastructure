name: Release

# Manually cut a release: Actions -> Release -> Run workflow, pick the bump
# level. Computes the next semver from the latest v* tag, then creates the
# tag and a GitHub Release with auto-generated notes.
on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump level
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so all tags are available

      - name: Compute next version
        id: version
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          # Only consider well-formed vX.Y.Z tags so arbitrary tag names
          # can't reach the arithmetic below.
          latest="$(git tag --list 'v*' --sort=-v:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)"
          latest="${latest:-v0.0.0}"
          IFS=. read -r major minor patch <<< "${latest#v}"
          case "$BUMP" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          tag="v${major}.${minor}.${patch}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "Releasing ${tag} (previous: ${latest})"

      - name: Create tag and GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh release create "$TAG" \
            --target "${{ github.sha }}" \
            --title "$TAG" \
            --generate-notes

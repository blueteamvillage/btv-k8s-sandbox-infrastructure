# Challenge 020 — dedicated namespace for the forensic artifact.
#
# Bundled so `kubectl apply -f challenge-020.pod.yaml` is self-contained: kubectl
# creates the Namespace before the Pod. The forensic artifact is restricted-PSS
# compliant, so the namespace enforces the restricted Pod Security Standard.
apiVersion: v1
kind: Namespace
metadata:
  name: challenge-020
  labels:
    challenge: "020"
    scenario: winnti-azazel-userland-rootkit-backdoor
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
---
# Challenge 020 — post-detonation forensic artifact pod.
#
# Runs the published forensic-artifact image (ghcr.io/blueteamvillage/challenge-020)
# so analysts can inspect the detonation evidence under /forensics:
#   kubectl --context dc34 -n challenge-020 exec -it challenge-020 -- sh          # then: cat /forensics/tetragon-events.json
#   kubectl --context dc34 -n challenge-020 cp challenge-020:/forensics ./challenge-020-forensics
#
# Unlike the live-malware sandbox pod (pod.yaml, not shipped in this repo), this artifact is INERT — the live
# sample was wiped and flattened out of the image, so it needs no privileges and no
# Kyverno PolicyException. The securityContext below satisfies the cluster's
# restricted Pod Security policies (drop ALL caps, no privilege escalation, run as
# non-root, RuntimeDefault seccomp). A bare `kubectl run` is rejected by admission
# precisely because it omits these — apply this manifest instead.
apiVersion: v1
kind: Pod
metadata:
  name: challenge-020
  namespace: challenge-020
  labels:
    app: challenge-020
    challenge: "020"
    scenario: winnti-azazel-userland-rootkit-backdoor
spec:
  # Static artifact; if it stops there is nothing to recover by restarting.
  restartPolicy: Never
  # The artifact has no business talking to the k8s API.
  automountServiceAccountToken: false
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: challenge-020
      image: ghcr.io/blueteamvillage/challenge-020:latest
      # IfNotPresent uses the locally loaded image; otherwise the kubelet pulls
      # from GHCR. The package is PRIVATE until the CTF opens — see README
      # "Pulling challenge images" for the login/pull/load steps.
      imagePullPolicy: IfNotPresent
      securityContext:
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 128Mi
